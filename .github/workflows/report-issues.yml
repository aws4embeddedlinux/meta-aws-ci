name: Report Issues and PRs

on:
  schedule:
    - cron: '0 1 * * *'  # Daily at 1:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate issues/PRs report
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/report_issues.py > docs/issues.html

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "Update issues/PRs report"
          title: "chore: Update issues/PRs report"
          body: |
            Automated update of open issues and pull requests across all repositories.
            
            Generated by workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          branch: update-issues-report
          delete-branch: true
