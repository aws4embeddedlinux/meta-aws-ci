name: Report Issues and PRs

on:
  schedule:
    - cron: '0 1 * * *'  # Daily at 1:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate issues/PRs report
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/report_issues.py > docs/issues.html

      - name: Commit and push to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/issues.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update issues/PRs report" && git pull --rebase && git push)
