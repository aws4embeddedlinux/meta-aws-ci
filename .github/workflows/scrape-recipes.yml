name: Scrape meta-aws recipes

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate recipe version reports
        run: python scripts/scrape_meta_aws.py > docs/recipe-versions.html

      - name: Push to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages:gh-pages
          mv docs/recipe-versions*.html /tmp/
          git checkout gh-pages
          mv /tmp/recipe-versions*.html docs/
          git add docs/recipe-versions*.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update recipe versions report" && git pull --rebase origin gh-pages && git push)
