name: Report Security Alerts

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate security alerts report
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/report_security.py > docs/security.html

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "Update security alerts report"
          title: "chore: Update security alerts report"
          body: |
            Automated update of Dependabot security alerts across all repositories.
            
            Generated by workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          branch: update-security-report
          delete-branch: true
